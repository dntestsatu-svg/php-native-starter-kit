name: PHP CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: php-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: native
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379

      memcached:
        image: memcached:latest
        ports:
          - 11211:11211

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_mysql, memcached
          coverage: none
          tools: composer:v2

      - name: Restore Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test environment
        run: |
          cp .env.example .env
          cat >> .env <<'ENVVARS'
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://127.0.0.1
          APP_TIMEZONE=UTC

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=native
          DB_USERNAME=root
          DB_PASSWORD=root

          SESSION_DRIVER=redis
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          REDIS_DATABASE=0

          CACHE_STORE=memcached
          MEMCACHED_HOST=127.0.0.1
          MEMCACHED_PORT=11211
          ENVVARS

      - name: Wait for services
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; do sleep 1; done
          for port in 6379 11211; do
            until (echo > /dev/tcp/127.0.0.1/$port) >/dev/null 2>&1; do sleep 1; done
          done

      - name: Run migrations
        run: composer run migrate

      - name: Run test suite
        run: composer run test:all
